<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Manager</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/schedule.css">
  <link rel="stylesheet" href="css/pages/sns.css">
</head>
<body>

<div class="app">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <button class="topbar__menu-btn btn-icon" id="topbar-menu-btn" title="サイドバーを折り畳む">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect y="3" width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="8" width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="13" width="18" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <span class="topbar__logo">Artist<span>Mgr</span></span>

    <div class="topbar__artist-info">
      <span id="topbar-artist" class="topbar__artist-name"></span>
    </div>

    <div class="topbar__actions">
      <button class="btn btn-primary btn-sm" id="topbar-action-btn" style="display:none">+ 追加</button>
      <button class="btn btn-icon" id="topbar-settings-btn" title="アーティスト設定">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 10a2 2 0 100-4 2 2 0 000 4z" fill="currentColor"/>
          <path fill-rule="evenodd" clip-rule="evenodd" d="M8 1a1 1 0 00-1 1v.17a5.01 5.01 0 00-1.5.62L4.8 2.08a1 1 0 00-1.41.01L2.1 3.37a1 1 0 000 1.41l.72.72A5.01 5.01 0 002.17 7H2a1 1 0 000 2h.17a5 5 0 00.64 1.5l-.72.72a1 1 0 000 1.41l1.28 1.29a1 1 0 001.41 0l.72-.72A5 5 0 007 13.83V14a1 1 0 002 0v-.17a5 5 0 001.5-.63l.72.72a1 1 0 001.41 0l1.28-1.29a1 1 0 000-1.41l-.72-.72A5 5 0 0013.83 9H14a1 1 0 000-2h-.17a5.01 5.01 0 00-.64-1.5l.72-.72a1 1 0 000-1.41L12.63 2.1a1 1 0 00-1.41 0l-.72.72A5.01 5.01 0 009 2.17V2a1 1 0 00-1-1zM4 8a4 4 0 118 0A4 4 0 014 8z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Body ── -->
  <div class="body">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">

      <!-- Artists section -->
      <div class="sidebar__section">
        <div class="sidebar__label">アーティスト</div>
        <div class="sidebar__artists" id="sidebar-artists">
          <!-- rendered by JS -->
        </div>
        <button class="sidebar__add-artist" id="add-artist-btn" title="アーティストを追加">
          <div class="sidebar__add-icon">+</div>
          <span>アーティストを追加</span>
        </button>
      </div>

      <div class="sidebar__divider"></div>

      <!-- Nav -->
      <nav class="sidebar__nav" id="sidebar-nav">
        <!-- rendered by JS -->
      </nav>

    </aside>

    <!-- ── Content Area ── -->
    <main class="content" id="content-area">
      <!-- page content injected by JS -->
    </main>

  </div><!-- /body -->

</div><!-- /app -->

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- JS -->
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/artists.js"></script>
<script src="js/schedule.js"></script>
<script src="js/sns.js"></script>
<script src="js/data/seed.js"></script>
<script src="js/app.js"></script>

</body>
</html>
